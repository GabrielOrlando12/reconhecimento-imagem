<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gerenciador de Tarefas</title>
  <meta name="description" content="Gerencie suas tarefas pessoais, de trabalho e estudos com TaskFlow." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { font-family: 'Inter', sans-serif; }

    body {
      background-color: #0f172a;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .input-field {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f1f5f9;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08);
    }

    .input-field::placeholder { color: #475569; }

    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.25);
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
      transform: translateY(-1px);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
      transition: all 0.2s;
    }
    .btn-success:hover {
      background: linear-gradient(135deg, #34d399, #10b981);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-complete {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s;
      font-size: 0.7rem;
    }
    .btn-complete:hover {
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.4);
      color: #34d399;
    }

    .todo-card { transition: all 0.3s; }
    .todo-card.done {
      opacity: 0.45;
    }
    .todo-card.done .todo-title {
      text-decoration: line-through;
      color: #64748b;
    }

    .badge-work   { background: rgba(14,165,233,0.15); color: #38bdf8; border: 1px solid rgba(14,165,233,0.25); }
    .badge-personal { background: rgba(236,72,153,0.12); color: #f472b6; border: 1px solid rgba(236,72,153,0.25); }
    .badge-study  { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }

    .screen { display: none; }
    .screen.active { display: flex; }

    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    select.input-field option { background: #1e293b; color: #f1f5f9; }
  </style>
</head>
<body class="min-h-screen text-slate-100">

  <!-- ====== TELA DE LOGIN ====== -->
  <div id="screen-login" class="screen active min-h-screen items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md fade-in">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-sky-500/10 border border-sky-500/20 mb-4">
          <svg class="w-6 h-6 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight">TaskFlow</h1>
        <p class="text-slate-400 text-sm mt-1">Entre na sua conta para continuar</p>
      </div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label for="login-email" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">E-mail</label>
          <input type="email" id="login-email" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="seu@email.com" />
          <p id="login-email-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>
        <div>
          <label for="login-password" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Senha</label>
          <input type="password" id="login-password" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="••••••••" />
          <p id="login-password-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>
        <p id="login-general-error" class="text-red-400 text-xs text-center hidden bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></p>
        <button type="submit" id="login-submit" class="btn-primary w-full text-white font-medium py-3 rounded-xl text-sm mt-2">
          Entrar
        </button>
      </form>

      <p class="text-center mt-6 text-slate-500 text-sm">
        Não tem uma conta?
        <button type="button" id="show-register" class="text-sky-400 hover:text-sky-300 transition-colors ml-1 font-medium">
          Criar conta
        </button>
      </p>
    </div>
  </div>

  <!-- ====== TELA DE CADASTRO ====== -->
  <div id="screen-register" class="screen min-h-screen items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md fade-in">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-emerald-500/10 border border-emerald-500/20 mb-4">
          <svg class="w-6 h-6 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight">Criar Conta</h1>
        <p class="text-slate-400 text-sm mt-1">Comece a organizar suas tarefas hoje</p>
      </div>

      <form id="register-form" class="space-y-4" novalidate>
        <div>
          <label for="register-name" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Nome</label>
          <input type="text" id="register-name" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="Seu nome completo" />
          <p id="register-name-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>
        <div>
          <label for="register-email" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">E-mail</label>
          <input type="email" id="register-email" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="seu@email.com" />
          <p id="register-email-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>
        <div>
          <label for="register-password" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Senha</label>
          <input type="password" id="register-password" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="Mínimo 6 caracteres" />
          <p id="register-password-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>
        <p id="register-general-error" class="text-red-400 text-xs text-center hidden bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></p>
        <button type="submit" id="register-submit" class="btn-success w-full text-white font-medium py-3 rounded-xl text-sm mt-2">
          Criar conta
        </button>
      </form>

      <p class="text-center mt-6 text-slate-500 text-sm">
        Já tem uma conta?
        <button type="button" id="show-login" class="text-sky-400 hover:text-sky-300 transition-colors ml-1 font-medium">
          Fazer login
        </button>
      </p>
    </div>
  </div>

  <!-- ====== TELA DO APP (DASHBOARD) ====== -->
  <div id="screen-app" class="screen min-h-screen flex-col">

    <!-- Header -->
    <header class="glass border-b border-white/5 sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-sky-500/10 border border-sky-500/20 flex items-center justify-center">
            <svg class="w-4 h-4 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </div>
          <div>
            <p class="text-xs text-slate-500 leading-none">Bem-vindo de volta</p>
            <p id="user-greeting" class="text-sm font-medium text-slate-200 leading-tight mt-0.5"></p>
          </div>
        </div>
        <button id="logout-btn" class="btn-ghost text-slate-400 hover:text-slate-200 px-4 py-2 rounded-xl text-sm flex items-center gap-2 cursor-pointer">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sair
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-6 py-8 w-full flex-1">

      <!-- Formulário de nova tarefa -->
      <section class="glass rounded-2xl p-6 mb-6">
        <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-5 flex items-center gap-2">
          <svg class="w-4 h-4 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          Nova Tarefa
        </h2>
        <form id="todo-form" class="space-y-4" novalidate>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="sm:col-span-1">
              <label for="todo-title" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Título <span class="text-red-400">*</span></label>
              <input type="text" id="todo-title" class="input-field w-full rounded-xl px-4 py-3 text-sm" placeholder="Ex: Revisar relatório..." />
              <p id="todo-title-error" class="text-red-400 text-xs mt-1 hidden"></p>
            </div>
            <div class="sm:col-span-1">
              <label for="todo-type" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Tipo</label>
              <select id="todo-type" class="input-field w-full rounded-xl px-4 py-3 text-sm cursor-pointer">
                <option value="Trabalho">💼 Trabalho</option>
                <option value="Pessoal">🏠 Pessoal</option>
                <option value="Estudos">📚 Estudos</option>
              </select>
            </div>
          </div>
          <div>
            <label for="todo-description" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Descrição <span class="text-slate-600 font-normal normal-case">(opcional)</span></label>
            <textarea id="todo-description" class="input-field w-full rounded-xl px-4 py-3 text-sm resize-none" rows="3" placeholder="Adicione mais detalhes sobre a tarefa..."></textarea>
          </div>
          <div class="flex justify-end">
            <button type="submit" id="todo-submit" class="btn-primary text-white font-medium px-6 py-3 rounded-xl text-sm flex items-center gap-2 cursor-pointer">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              Adicionar Tarefa
            </button>
          </div>
        </form>
      </section>

      <!-- Lista de tarefas -->
      <section>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider flex items-center gap-2">
            <svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2" />
            </svg>
            Minhas Tarefas
          </h2>
          <span id="todo-count" class="text-xs text-slate-500 bg-slate-800/60 px-3 py-1 rounded-full border border-white/5"></span>
        </div>
        <div id="todo-list" class="space-y-3"></div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
